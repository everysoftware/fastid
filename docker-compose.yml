services:
  postgres:
    env_file:
      - .env
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?database password required}
      POSTGRES_USER: ${POSTGRES_USER:-fastid}
      POSTGRES_DB: ${POSTGRES_DB:-fastid}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fastid} -d ${POSTGRES_DB:-fastid}" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  redis:
    env_file:
      - .env
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?redis password required}
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.30.1
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8025/readyz" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  fastid-app:
    env_file:
      - .env
    image: everysoftware/fastid:latest
    ports:
      - "8012:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy

    environment:
      FASTID_DB_URL: ${FASTID_DB_URL:-postgresql+asyncpg://${POSTGRES_USER:-fastid}:${POSTGRES_PASSWORD:?database password required}@postgres:5432/${POSTGRES_DB:-fastid}}
      FASTID_REDIS_URL: ${FASTID_REDIS_URL:-redis://:${REDIS_PASSWORD:?redis password required}@redis:6379/0}
      FASTID_SMTP_ENABLED: ${FASTID_SMTP_ENABLED:-true}
      FASTID_SMTP_HOST: ${FASTID_SMTP_HOST:-mailpit}
      FASTID_SMTP_PORT: ${FASTID_SMTP_PORT:-1025}

    volumes:
      - "./certs:/opt/fastid/certs"

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/readiness" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  fastid-webhook-worker:
    env_file:
      - .env
    image: everysoftware/fastid:latest
    entrypoint: ["python", "-m", "fastid.webhooks.worker"]
    depends_on:
      fastid-app:
        condition: service_healthy
    environment:
      FASTID_DB_URL: ${FASTID_DB_URL:-postgresql+asyncpg://${POSTGRES_USER:-fastid}:${POSTGRES_PASSWORD:?database password required}@postgres:5432/${POSTGRES_DB:-fastid}}
      FASTID_WEBHOOK_ALLOW_INSECURE_URLS: ${FASTID_WEBHOOK_ALLOW_INSECURE_URLS:-false}
    restart: unless-stopped

volumes:
  pg_data:
