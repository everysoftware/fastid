name: Run all tests

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        database-name:
          - ci
        database-user:
          - postgres
        database-password:
          - postgres
        database-host:
          - localhost
        database-port:
          - 5412
        redis-username:
          - default
        redis-password:
          - password
        redis-host:
          - localhost
        redis-port:
          - 6312

    env:
      POSTGRES_USER: ${{ matrix.database-user }}
      POSTGRES_PASSWORD: ${{ matrix.database-password }}
      POSTGRES_DB: ${{ matrix.database-name }}
      REDIS_PASSWORD: ${{ matrix.redis-password }}

    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          pip install poetry
          poetry config virtualenvs.create false
          poetry install

      - name: Run checks
        run: |
          poetry run make check-all

      - name: Setup test environment
        run: |
          touch .env
          docker compose -f docker-compose.dev.yml down -v --remove-orphans
          docker compose -f docker-compose.dev.yml up postgres redis -d --wait --remove-orphans
          poetry run make certs

      - name: Run tests
        run: |
          poetry run make testcov
        env:
          FASTID_DB_URL: postgresql+asyncpg://${{ matrix.database-user }}:${{ matrix.database-password }}@${{ matrix.database-host }}:${{ matrix.database-port }}/${{ matrix.database-name }}
          FASTID_REDIS_URL: redis://${{ matrix.redis-user }}:${{ matrix.redis-password }}@${{ matrix.redis-host }}:${{ matrix.redis-port }}
          FASTID_GOOGLE_OAUTH_ENABLED: 1
          FASTID_YANDEX_OAUTH_ENABLED: 1
          FASTID_VK_OAUTH_ENABLED: 1
          FASTID_SMTP_ENABLED: 1
          FASTID_TELEGRAM_WIDGET_ENABLED: 1
          FASTID_TELEGRAM_NOTIFICATION_ENABLED: 1
          FASTID_TELEGRAM_BOT_TOKEN: 123456:BOT_SECRET
          FASTID_WEBHOOK_PAGE_EXPIRES_IN_SECONDS: 0

      - name: Teardown test environment
        run: |
          docker compose -f docker-compose.dev.yml down -v --remove-orphans

      - name: Store coverage files
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov
          include-hidden-files: true
